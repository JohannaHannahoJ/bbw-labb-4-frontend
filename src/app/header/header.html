<header id="main-header">
  <h1>Kära Dagbok</h1>
  <nav>
    <ul>

      @if(authService.isLoggedIn()) {
      <li><a routerLink="/dashboard" routerLinkActive="current">Dagbok</a></li>
      <li><a routerLink="/create-entry" routerLinkActive="current">Nytt inlägg</a></li>
      <li><a (click)="logout()">Logga ut</a></li>
      } @else {
      <li><a routerLink="/login" routerLinkActive="current">Logga in</a></li>
      <li><a routerLink="/register" routerLinkActive="current">Skapa konto</a></li>
      }

    </ul>
  </nav>
</header>
